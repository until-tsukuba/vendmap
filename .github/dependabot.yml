version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    commit-message:
      prefix: 'deps'
    labels:
      - 'dependencies'
    open-pull-requests-limit: 5
    groups:
      patch-updates:
        patterns:
          - '*'
        update-types:
          - 'patch'

      minor-updates:
        patterns:
          - '*'
        update-types:
          - 'minor'
